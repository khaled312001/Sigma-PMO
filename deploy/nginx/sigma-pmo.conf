# Sigma PMO — nginx reverse proxy
#
# Place at /etc/nginx/sites-available/sigma-pmo.conf and symlink into
# /etc/nginx/sites-enabled/. TLS issued by certbot --nginx.
#
# Routes:
#   /        → frontend Next.js on 127.0.0.1:3000
#   /api/    → backend NestJS on 127.0.0.1:3001
#
# Upstream definitions allow keepalive and clean health-check overrides.

upstream sigma_pmo_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream sigma_pmo_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP → HTTPS redirect (certbot rewrites the listen line on first run)
server {
    listen 80;
    listen [::]:80;
    server_name app.sigma.example;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.sigma.example;

    # TLS — certbot will manage these paths.
    ssl_certificate     /etc/letsencrypt/live/app.sigma.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.sigma.example/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (helmet also sets these app-side, but defence-in-depth)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Body limit aligns with backend express.json({ limit: '25mb' })
    client_max_body_size 25m;

    # Compression for static assets only
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API
    location /api/ {
        proxy_pass http://sigma_pmo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://sigma_pmo_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_set_header Upgrade           $http_upgrade;       # HMR websockets in dev
    }
}
