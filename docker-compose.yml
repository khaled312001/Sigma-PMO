# Sigma PMO — full stack: MySQL (db) + NestJS (backend) + Next.js (frontend).
# Each service is its own container; the database has its own persistent volume
# and private network — nothing else touches it directly.
#
# Secrets (DB_PASSWORD, SETTINGS_ENCRYPTION_KEY, ANTHROPIC_API_KEY, S3_*, STRIPE_*,
# BACKUP_ENCRYPTION_KEY) are injected from the host / Coolify "Environment
# Variables" — never commit real values. Non-secret defaults are inlined so the
# stack boots with sensible production URLs out of the box.
#
# Schema: the backend runs the TypeORM migrations AUTOMATICALLY on first boot
# (NODE_ENV=production => migrationsRun), so a fresh db volume is fully built
# before the API serves traffic. No manual migration step.

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${DB_DATABASE:-sigma_pmo}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - sigma
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-rootpw}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      # Database (internal — reached by the compose service name "db").
      DB_HOST: db
      DB_PORT: "3306"
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-rootpw}
      DB_DATABASE: ${DB_DATABASE:-sigma_pmo}
      DB_SYNCHRONIZE: "false"
      # Seed the default company + 15 demo role accounts on first boot so the
      # login user-picker works immediately. Set to "false" for a real tenant.
      SEED_DEMO: ${SEED_DEMO:-true}
      # Public URLs (Coolify domains).
      CORS_ORIGINS: ${CORS_ORIGINS:-https://system.sigma-pmo.com}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://system.sigma-pmo.com}
      # Secrets / integrations — injected from Coolify env vars.
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Object storage — Cloudflare R2 / S3-compatible (file archive + DB backups).
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
      # Stripe billing (optional).
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    networks:
      - sigma
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/v1/live"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* are inlined at BUILD time — must be the PUBLIC backend URL
        # the browser will call, and the demo-login toggle.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://system-api.sigma-pmo.com/api/v1}
        NEXT_PUBLIC_DEMO_LOGIN: ${NEXT_PUBLIC_DEMO_LOGIN:-true}
    restart: unless-stopped
    networks:
      - sigma
    depends_on:
      - backend

networks:
  sigma:
    driver: bridge

volumes:
  dbdata:
